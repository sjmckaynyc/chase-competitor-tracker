name: Daily Competitor Scan Engine

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-refresh:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Files
      uses: actions/checkout@v3

    - name: Set Up Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Network Requests Dependency
      run: pip install requests

    - name: Execute Live Strategy Scrape
      env:
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python scraper.py

    - name: Auto-Commit Fresh Data to Live Webpage
      run: |
        git config --global user.name 'Automated Bot'
        git config --global user.email 'bot@github.com'
        git add data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Morning Pulse Sync" && git push)
